<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTD Database</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2b2b2b; color: #fff; padding: 30px; }
        h1 { text-align: center; color: #6b8e23; }

        /* The Grid Container */
        #database-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Individual Card Styles */
        .card { background-color: #e0e0e0; color: #333; border-radius: 8px; overflow: hidden; border: 4px solid #6b8e23; display: flex; flex-direction: column; }
        .card-header { background-color: #6b8e23; color: white; text-align: center; padding: 15px; font-size: 20px; font-weight: bold; }
        .card-header a { color: white; text-decoration: none; }
        .card-header a:hover { text-decoration: underline; }
        .section-title { background-color: #556b2f; color: white; text-align: center; padding: 5px; font-weight: bold; font-size: 14px; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #ccc; font-size: 14px; }
        .stat-label { font-weight: bold; }

        /* Rarity Badges */
        .rarity-badge { padding: 3px 8px; border-radius: 4px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); font-size: 12px; }
        .rarity-exclusive { background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3); color: white; }
        .rarity-godly { background-color: #e882e8; color: white; }
        .rarity-mythical { background-color: #ff3333; color: white; }
        .rarity-legendary { background-color: #ffd700; color: black; text-shadow: none; }
        .rarity-rare { background-color: #3366ff; color: white; }
        .rarity-uncommon { background-color: #33cc33; color: white; }
        .rarity-common { background-color: #999999; color: white; }
    </style>
</head>
<body>

    <h1>Gravity Tower Defense Database</h1>
    <div id="database-grid">Loading...</div>

    <script>
        function sanitizeClassName(s) {
            return (s || '').toString().trim().toLowerCase().replace(/[^a-z0-9\-]/g, '-');
        }

        fetch('database.json')
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(towersArray => {
                const gridContainer = document.getElementById('database-grid');
                gridContainer.innerHTML = '';
                if (!Array.isArray(towersArray) || towersArray.length === 0) {
                    gridContainer.innerHTML = '<p style="color:#ccc;text-align:center">No units found.</p>';
                    return;
                }

                towersArray.forEach(unit => {
                    const name = unit.name || 'Unknown';
                    const url = unit.url || '#';
                    let cardHTML = `<div class="card">`;
                    cardHTML += `<div class="card-header"><a href="${url}" target="_blank" rel="noopener noreferrer">${name}</a></div>`;
                    cardHTML += `<div class="section-title">Stats</div>`;

                    const stats = unit.stats || {};
                    for (const [label, value] of Object.entries(stats)) {
                        let finalValue = (value == null || value === '') ? '—' : value;
                        if (label === 'Rarity') {
                            const cls = sanitizeClassName(finalValue);
                            finalValue = `<span class="rarity-badge rarity-${cls}">${finalValue}</span>`;
                        }
                        cardHTML += `<div class="stat-row"><span class="stat-label">${label}</span><span>${finalValue}</span></div>`;
                    }

                    cardHTML += `</div>`;
                    gridContainer.insertAdjacentHTML('beforeend', cardHTML);
                });
            })
            .catch(err => {
                console.error('Error loading data:', err);
                document.getElementById('database-grid').innerHTML = '<p style="color:#f88;text-align:center">Failed to load data.</p>';
            });
    </script>

</body>
</html>
