<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTD Database & Tier List</title>
    <style>
        :root {
            --bg-color: #12121c;
            --card-bg: #1e1e2f;
            --text-color: #e0e0e0;
            --primary: #6b8e23;
            --secondary: #a2d149;
            --border: #32324e;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 20px; 
        }

        h1 { 
            text-align: center; 
            color: var(--secondary); 
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        /* Filter Controls */
        .controls-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        input[type="text"], select {
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            min-width: 200px;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--secondary);
        }

        /* The Grid Container */
        #database-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Individual Card Styles */
        .card { 
            background-color: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: var(--primary);
        }

        .card-header { 
            background-color: rgba(0,0,0,0.3); 
            text-align: center; 
            padding: 15px; 
            font-size: 22px; 
            font-weight: bold; 
            border-bottom: 1px solid var(--border);
        }

        .card-header a { 
            color: #fff; 
            text-decoration: none; 
            transition: color 0.2s;
        }

        .card-header a:hover { 
            color: var(--secondary); 
        }

        .stat-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 14px; 
            align-items: center;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label { 
            font-weight: 600; 
            color: #9aa0a6;
            max-width: 40%;
        }

        .stat-value {
            text-align: right;
            max-width: 55%;
            word-wrap: break-word;
        }

        /* Rarity Badges */
        .rarity-badge { 
            padding: 5px 10px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 12px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .rarity-common { background-color: #7f8c8d; color: white; }
        .rarity-uncommon { background-color: #2ecc71; color: white; }
        .rarity-rare { background-color: #3498db; color: white; }
        .rarity-epic { background-color: #9b59b6; color: white; }
        .rarity-legendary { background-color: #f1c40f; color: black; }
        .rarity-mythical, .rarity-mhytical { background-color: #e74c3c; color: white; } /* Handled typo from JSON */
        .rarity-godly { background-color: #ff9ff3; color: black; }
        .rarity-exclusive { background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3); color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .rarity-unknown { background-color: #555; color: white; }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: #888;
            padding: 40px;
        }
    </style>
</head>
<body>

    <h1>Gravity Tower Defense</h1>
    
    <div class="controls-container">
        <input type="text" id="search-input" placeholder="Search towers by name...">
        <select id="rarity-filter">
            <option value="All">All Rarities</option>
            </select>
    </div>

    <div id="database-grid">Loading tower data...</div>

    <script>
        let allTowers = [];

        function sanitizeClassName(s) {
            return (s || '').toString().trim().toLowerCase().replace(/[^a-z0-9\\-]/g, '-');
        }

        // Initialize application
        async function init() {
            try {
                const response = await fetch('database.json');
                if (!response.ok) throw new Error('Network response was not ok');
                allTowers = await response.json();
                
                populateRarityDropdown();
                renderGrid(allTowers);
            } catch (err) {
                console.error('Error loading data:', err);
                document.getElementById('database-grid').innerHTML = 
                    '<div class="no-results" style="color:#ff6b6b">Failed to load database.json. Make sure you are running a local web server (python -m http.server 8000).</div>';
            }
        }

        // Dynamically find all unique rarities in the JSON and add them to the select dropdown
        function populateRarityDropdown() {
            const filterDropdown = document.getElementById('rarity-filter');
            const rarities = new Set();

            allTowers.forEach(unit => {
                if (unit.stats && unit.stats.Rarity) {
                    // Fix some casing issues from scraping
                    rarities.add(unit.stats.Rarity.trim());
                }
            });

            // Sort rarities alphabetically (or you could map them to a custom tier list order)
            Array.from(rarities).sort().forEach(rarity => {
                const option = document.createElement('option');
                option.value = rarity;
                option.textContent = rarity;
                filterDropdown.appendChild(option);
            });
        }

        // Render the HTML cards
        function renderGrid(towersToRender) {
            const gridContainer = document.getElementById('database-grid');
            gridContainer.innerHTML = '';

            if (towersToRender.length === 0) {
                gridContainer.innerHTML = '<div class="no-results">No towers found matching your filters.</div>';
                return;
            }

            towersToRender.forEach(unit => {
                const name = unit.name || 'Unknown';
                const url = unit.url || '#';
                
                let cardHTML = `<div class="card">`;
                cardHTML += `<div class="card-header"><a href="${url}" target="_blank" rel="noopener noreferrer">${name}</a></div>`;

                const stats = unit.stats || {};
                for (const [label, value] of Object.entries(stats)) {
                    // Skip empty abilities or sounds to keep UI clean
                    if (label === 'Sound Attack' || value === '') continue;

                    let finalValue = (value == null || value === '') ? '—' : value;
                    
                    if (label === 'Rarity') {
                        const cls = sanitizeClassName(finalValue);
                        finalValue = `<span class="rarity-badge rarity-${cls}">${finalValue}</span>`;
                    }

                    cardHTML += `
                        <div class="stat-row">
                            <span class="stat-label">${label}</span>
                            <span class="stat-value">${finalValue}</span>
                        </div>`;
                }

                cardHTML += `</div>`;
                gridContainer.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // Handle Filtering logic
        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const selectedRarity = document.getElementById('rarity-filter').value;

            const filteredTowers = allTowers.filter(unit => {
                const matchesSearch = unit.name.toLowerCase().includes(searchTerm);
                const unitRarity = (unit.stats && unit.stats.Rarity) ? unit.stats.Rarity.trim() : '';
                const matchesRarity = (selectedRarity === 'All' || unitRarity === selectedRarity);

                return matchesSearch && matchesRarity;
            });

            renderGrid(filteredTowers);
        }

        // Event Listeners for the Search bar and Dropdown
        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('rarity-filter').addEventListener('change', applyFilters);

        // Run on page load
        init();
    </script>

</body>
</html>
